<!DOCTYPE html>
  <html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Play the Memory Game! | JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Memory Game</h2>
        <div class="game"></div>
          <button class = "reset" onclick="window.location.reload();">Reset Game</button>
    </div>
    <script>
      const emojis = ["😍","😍","💖","💖","🫐","🫐","🏏","🏏","🥹","🥹","😭","😭","☀️","☀️","💙","💙"];
      var shuf_emojis = emojis.sort(() => (Math.random()) > 0.5 ? 1 : -1);
      
      for (var i = 0; i < emojis.length; i++) {
         let box = document.createElement('div');
          box.className = 'item';
          box.innerHTML = shuf_emojis[i];

         box.onclick = function () {
            //Only allow clicking if less than 2 cards are currently open
            if (document.querySelectorAll('.boxOpen').length < 2) 
            {
                this.classList.add('boxOpen');
            }
      setTimeout(function () {
                let openCards = document.querySelectorAll('.boxOpen');
                
         if (openCards.length > 1) {
                    if (openCards[0].innerHTML == openCards[1].innerHTML) {
                        // ifthey match, mark as match and remove the open status
                          openCards[0].classList.add('boxMatch');
                          openCards[1].classList.add('boxMatch');
                          openCards[1].classList.remove('boxOpen');
                          openCards[0].classList.remove('boxOpen');
                      // Check if it is a win
                        if (document.querySelectorAll('.boxMatch').length == emojis.length) {
                            alert("Win!");
                        }
                    } else {
                        // If they don't match, flip the cards back over
                          openCards[1].classList.remove('boxOpen');
                          openCards[0].classList.remove('boxOpen');
                    }
                }
            }, 500);
      };
            document.querySelector('.game').appendChild(box);
          }
        </script>
    </body>
  </html>
